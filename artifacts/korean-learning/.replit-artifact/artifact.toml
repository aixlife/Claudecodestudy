kind = "web"
previewPath = "/"
title = "Claude Code 마스터 클래스"
version = "1.0.0"
id = "artifacts/korean-learning"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20579

[services.development]
run = "pnpm --filter @workspace/korean-learning run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/korean-learning", "run", "build" ]
publicDir = "artifacts/korean-learning/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20579"
BASE_PATH = "/"
